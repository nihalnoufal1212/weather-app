<!DOCTYPE html>
<html>

<head>

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>Weather App</h1>


<div class="searchBox">

<input
type="text"
id="city"
placeholder="Enter city (e.g. London)"
autocomplete="off"
>

<button id="searchBtn">Search</button>

</div>


<button id="unitToggle">Switch °C / °F</button>

<button class="locationBtn" onclick="getLocationWeather()">📍 Use My Location</button>


<div id="suggestions"></div>

<div id="status"></div>


<div id="weatherBox" class="hidden">

<h2 id="cityName"></h2>

<img id="icon">

<h3 id="temp"></h3>

<p id="condition"></p>

</div>


</div>

<script src="script.js"></script>

</body>

</html>
